<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#060f36"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <title>BZ · Chat do Manual</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root{
      --navy:#060f36;--blue:#0d2b8e;--mid:#1565c0;--cyan:#00c6ff;
      --white:#fff;--glass:rgba(255,255,255,.06);--glass2:rgba(255,255,255,.11);
      --border:rgba(255,255,255,.1);
      --safe-b:env(safe-area-inset-bottom,0px);
      --safe-l:env(safe-area-inset-left,0px);
      --safe-r:env(safe-area-inset-right,0px);
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    html,body{height:100%;overflow:hidden;}
    body{
      font-family:'Inter',sans-serif;
      background:var(--navy);
      display:flex;flex-direction:column;
      /* iOS height fix */
      height:100dvh;
    }
    #bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;}

    /* ══ HEADER ══════════════════════════════════════════════ */
    header{
      position:relative;z-index:10;flex-shrink:0;
      display:flex;align-items:center;justify-content:space-between;
      padding:0 20px;height:60px;
      background:rgba(6,15,54,.85);
      backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
      border-bottom:1px solid rgba(0,198,255,.12);
      box-shadow:0 4px 20px rgba(0,0,0,.4);
    }
    header::before{
      content:'';position:absolute;top:0;left:0;right:0;height:2px;
      background:linear-gradient(90deg,transparent,var(--cyan),transparent);
      opacity:.5;
    }
    .header-left{display:flex;align-items:center;gap:12px;}
    .logo-wrap img{
      width:40px;height:40px;border-radius:50%;object-fit:cover;
      border:2px solid rgba(0,198,255,.5);
      box-shadow:0 0 14px rgba(0,198,255,.3);
    }
    .header-titles h1{font-size:1rem;font-weight:700;color:#fff;letter-spacing:.2px;line-height:1.1;}
    .header-sub{font-size:.62rem;color:var(--cyan);opacity:.6;letter-spacing:1.8px;text-transform:uppercase;}
    .header-badge{
      display:flex;align-items:center;gap:7px;
      font-size:.75rem;color:rgba(255,255,255,.5);
      background:rgba(0,198,255,.06);border:1px solid rgba(0,198,255,.15);
      padding:5px 12px;border-radius:999px;
      max-width:240px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    }
    .badge-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;
      background:var(--cyan);box-shadow:0 0 6px rgba(0,198,255,.7);}

    /* ══ MAIN CONTAINER ══════════════════════════════════════ */
    #main{
      position:relative;z-index:1;
      display:flex;flex:1;overflow:hidden;
    }

    /* ══ CHAT PANEL ══════════════════════════════════════════ */
    #chat-panel{
      display:flex;flex-direction:column;
      width:45%;min-width:300px;
      border-right:1px solid var(--border);
    }
    #messages{
      flex:1;overflow-y:auto;overflow-x:hidden;
      padding:14px 14px 8px;
      display:flex;flex-direction:column;gap:11px;
      overscroll-behavior:contain;
      scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.07) transparent;
    }
    #messages::-webkit-scrollbar{width:3px;}
    #messages::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:3px;}

    .msg{
      max-width:85%;padding:11px 14px;border-radius:16px;
      font-size:.9rem;line-height:1.55;word-wrap:break-word;
      animation:fadeUp .2s ease;
    }
    @keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
    .msg.user{
      background:linear-gradient(135deg,var(--mid),#1e8fff);color:#fff;
      align-self:flex-end;border-bottom-right-radius:4px;
      box-shadow:0 3px 12px rgba(21,101,192,.3);
    }
    .msg.bot{
      background:var(--glass2);backdrop-filter:blur(10px);
      border:1px solid var(--border);color:rgba(255,255,255,.9);
      align-self:flex-start;border-bottom-left-radius:4px;
    }
    .msg.bot .msg-content{margin-bottom:8px;}
    .btn-ouvir{
      background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);
      border-radius:12px;padding:5px 11px;font-size:.74rem;
      cursor:pointer;color:rgba(255,255,255,.55);
      display:inline-flex;align-items:center;gap:4px;
      transition:all .2s;font-family:inherit;
    }
    .btn-ouvir:hover,.btn-ouvir:active{background:rgba(255,255,255,.1);color:#fff;}
    .btn-ouvir.falando{background:rgba(0,198,255,.12);border-color:var(--cyan);color:var(--cyan);}

    .typing{display:flex;gap:5px;align-items:center;padding:12px 14px;}
    .typing span{width:7px;height:7px;background:var(--cyan);border-radius:50%;
      animation:bounce 1.2s infinite;opacity:.7;}
    .typing span:nth-child(2){animation-delay:.2s;}
    .typing span:nth-child(3){animation-delay:.4s;}
    @keyframes bounce{0%,80%,100%{transform:scale(.75);opacity:.4}40%{transform:scale(1.1);opacity:1}}

    /* ══ INPUT ═══════════════════════════════════════════════ */
    #input-area{
      padding:10px 12px 12px;
      background:rgba(6,15,54,.7);backdrop-filter:blur(16px);
      border-top:1px solid var(--border);
      display:flex;align-items:flex-end;gap:8px;
    }
    #pergunta-input{
      flex:1;background:var(--glass);
      border:1px solid var(--border);border-radius:20px;
      padding:10px 15px;font-size:.9rem;color:#fff;
      outline:none;resize:none;max-height:100px;
      font-family:inherit;line-height:1.5;
      transition:border-color .2s,box-shadow .2s;
    }
    #pergunta-input::placeholder{color:rgba(255,255,255,.28);}
    #pergunta-input:focus{border-color:rgba(0,198,255,.4);box-shadow:0 0 0 3px rgba(0,198,255,.08);}
    .btn-round{
      width:42px;height:42px;border-radius:50%;border:none;
      display:flex;align-items:center;justify-content:center;
      cursor:pointer;flex-shrink:0;font-size:1.05rem;transition:all .2s;
    }
    #btn-mic{background:var(--glass);border:1px solid var(--border);color:rgba(255,255,255,.65);}
    #btn-mic.gravando{background:rgba(255,80,80,.2);border-color:#ff5050;color:#ff5050;
      animation:pulsar 1s infinite;}
    @keyframes pulsar{0%,100%{box-shadow:0 0 0 0 rgba(255,80,80,.3)}50%{box-shadow:0 0 0 8px rgba(255,80,80,0)}}
    #btn-enviar{
      background:linear-gradient(135deg,var(--mid),var(--cyan));color:#fff;
      box-shadow:0 3px 12px rgba(0,198,255,.25);
    }
    #btn-enviar:disabled{opacity:.3;cursor:not-allowed;box-shadow:none;}

    /* ══ PDF PANEL ═══════════════════════════════════════════ */
    #pdf-panel{
      flex:1;display:flex;flex-direction:column;overflow:hidden;
      background:rgba(4,10,40,.5);
    }
    #pdf-toolbar{
      display:flex;align-items:center;justify-content:space-between;
      padding:9px 14px;
      background:rgba(6,15,54,.7);border-bottom:1px solid var(--border);
      flex-shrink:0;gap:10px;
    }
    #pdf-toolbar-title{font-size:.75rem;color:rgba(255,255,255,.5);
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .nav-btns{display:flex;align-items:center;gap:6px;flex-shrink:0;}
    .nav-btn{
      background:var(--glass);border:1px solid var(--border);
      color:rgba(255,255,255,.7);border-radius:8px;
      padding:5px 11px;font-size:.78rem;cursor:pointer;
      font-family:inherit;transition:all .2s;
    }
    .nav-btn:hover,.nav-btn:active{background:var(--glass2);color:#fff;}
    .nav-btn:disabled{opacity:.25;cursor:not-allowed;}
    #pagina-info{font-size:.75rem;color:rgba(255,255,255,.4);white-space:nowrap;}
    #pdf-container{
      flex:1;overflow-y:auto;overflow-x:hidden;
      display:flex;flex-direction:column;align-items:center;
      padding:16px 12px;
      overscroll-behavior:contain;
      scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.07) transparent;
    }
    #pdf-container::-webkit-scrollbar{width:3px;}
    #pdf-container::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:3px;}
    #pdf-placeholder{
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      height:100%;gap:14px;color:rgba(255,255,255,.2);text-align:center;padding:28px;
    }
    #pdf-placeholder .icon{font-size:3rem;opacity:.25;}
    #pdf-placeholder p{font-size:.85rem;line-height:1.7;}
    .page-wrapper{
      position:relative;margin-bottom:16px;
      box-shadow:0 4px 24px rgba(0,0,0,.5);border-radius:6px;overflow:hidden;
      border:1px solid rgba(255,255,255,.08);
    }
    .page-label{
      position:absolute;top:8px;left:8px;z-index:3;
      background:rgba(0,198,255,.85);color:#fff;
      font-size:.68rem;font-weight:700;letter-spacing:.5px;
      padding:3px 8px;border-radius:10px;
      box-shadow:0 2px 8px rgba(0,0,0,.4);
    }
    canvas.page-canvas{display:block;}
    canvas.hl-canvas{position:absolute;top:0;left:0;pointer-events:none;}

    /* ══ MOBILE TAB BAR ══════════════════════════════════════ */
    #tab-bar{display:none;}

    /* ══ RESPONSIVE — MOBILE ═════════════════════════════════ */
    @media(max-width:700px){

      /* Header menor */
      header{height:56px;padding:0 16px;}
      .logo-wrap img{width:36px;height:36px;}
      .header-titles h1{font-size:.9rem;}
      .header-sub{display:none;}
      /* Badge escondido, substituído pela tab */
      .header-badge{display:none;}

      /* Layout empilhado mas com tabs */
      #main{flex-direction:column;position:relative;}

      /* Chat ocupa tudo */
      #chat-panel{
        width:100%;border-right:none;
        position:absolute;inset:0;bottom:0;
        transition:transform .25s ease, opacity .25s ease;
      }
      #chat-panel.tab-hidden{
        transform:translateX(-100%);opacity:0;pointer-events:none;
      }

      /* PDF ocupa tudo */
      #pdf-panel{
        position:absolute;inset:0;bottom:0;
        transition:transform .25s ease, opacity .25s ease;
        transform:translateX(100%);opacity:0;pointer-events:none;
      }
      #pdf-panel.tab-active{
        transform:translateX(0);opacity:1;pointer-events:auto;
      }

      /* Input: padding bottom para a tab bar */
      #input-area{
        padding-bottom:calc(12px + 60px + var(--safe-b));
      }

      /* Tab bar visível */
      #tab-bar{
        display:flex;
        position:fixed;bottom:0;left:0;right:0;
        z-index:20;height:calc(60px + var(--safe-b));
        padding-bottom:var(--safe-b);
        background:rgba(4,8,40,.95);
        backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
        border-top:1px solid rgba(0,198,255,.15);
        box-shadow:0 -4px 20px rgba(0,0,0,.4);
      }
      .tab{
        flex:1;display:flex;flex-direction:column;align-items:center;
        justify-content:center;gap:4px;border:none;background:none;
        color:rgba(255,255,255,.4);font-family:inherit;
        font-size:.68rem;font-weight:500;letter-spacing:.3px;
        cursor:pointer;transition:color .2s;position:relative;
        padding:0 8px;
      }
      .tab.active{color:var(--cyan);}
      .tab-icon{font-size:1.35rem;line-height:1;}
      .tab-label{text-transform:uppercase;letter-spacing:.8px;}

      /* Indicador linha ativa */
      .tab.active::before{
        content:'';position:absolute;top:0;left:20%;right:20%;height:2px;
        background:var(--cyan);border-radius:0 0 3px 3px;
        box-shadow:0 0 8px var(--cyan);
      }

      /* Badge de páginas encontradas */
      .tab-badge{
        position:absolute;top:8px;right:calc(50% - 20px);
        background:#ff4757;color:#fff;
        font-size:.6rem;font-weight:700;
        min-width:16px;height:16px;border-radius:8px;
        display:flex;align-items:center;justify-content:center;
        padding:0 4px;
        box-shadow:0 2px 6px rgba(0,0,0,.4);
      }

      /* Mensagens mais largas no mobile */
      .msg{max-width:92%;}

      /* Input maior no mobile */
      #pergunta-input{font-size:1rem;padding:11px 15px;}
      .btn-round{width:44px;height:44px;}

      /* PDF toolbar mais compacta */
      #pdf-toolbar{padding:8px 12px;}
      #pdf-toolbar-title{font-size:.72rem;}
      .nav-btn{padding:5px 10px;font-size:.75rem;}
    }
  </style>
</head>
<body>
<canvas id="bg-canvas"></canvas>

<header>
  <div class="header-left">
    <div class="logo-wrap"><img src="/static/logo.jpeg" alt="BZ"/></div>
    <div class="header-titles">
      <h1>Chat do Manual</h1>
      <span class="header-sub">Assistente de documentos</span>
    </div>
  </div>
  <div class="header-badge">
    <span class="badge-dot"></span>
    <span>{{ manual_nome }}</span>
  </div>
</header>

<div id="main">
  <!-- CHAT -->
  <div id="chat-panel">
    <div id="messages"></div>
    <div id="input-area">
      <textarea id="pergunta-input" placeholder="Escreve a tua pergunta..." rows="1"
        onkeydown="verificarEnter(event)" oninput="autoResize(this)"></textarea>
      <button class="btn-round" id="btn-mic" title="Falar" onclick="alternarMic()">🎤</button>
      <button class="btn-round" id="btn-enviar" title="Enviar" onclick="enviar()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- PDF VIEWER -->
  <div id="pdf-panel">
    <div id="pdf-toolbar">
      <span id="pdf-toolbar-title">Visualizador do manual</span>
      <div class="nav-btns">
        <button class="nav-btn" id="btn-prev" onclick="navPagina(-1)" disabled>‹</button>
        <span id="pagina-info">—</span>
        <button class="nav-btn" id="btn-next" onclick="navPagina(1)" disabled>›</button>
      </div>
    </div>
    <div id="pdf-container">
      <div id="pdf-placeholder">
        <div class="icon">📑</div>
        <p>Faz uma pergunta no chat<br/>e as páginas relevantes<br/>aparecerão aqui com destaque.</p>
      </div>
    </div>
  </div>
</div>

<!-- TAB BAR (mobile only) -->
<div id="tab-bar">
  <button class="tab active" id="tab-chat" onclick="abrirTab('chat')">
    <span class="tab-icon">💬</span>
    <span class="tab-label">Chat</span>
  </button>
  <button class="tab" id="tab-pdf" onclick="abrirTab('pdf')">
    <span class="tab-icon">📄</span>
    <span class="tab-label">Manual</span>
  </button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ── CANVAS FUNDO ─────────────────────────────────────────────
(function(){
  const cv=document.getElementById('bg-canvas'),cx=cv.getContext('2d');
  let W,H,pts=[];
  const resize=()=>{W=cv.width=innerWidth;H=cv.height=innerHeight;};
  function Pt(){this.x=Math.random()*W;this.y=Math.random()*H;
    this.vx=(Math.random()-.5)*.22;this.vy=(Math.random()-.5)*.22;
    this.a=Math.random()*.4+.07;}
  const init=()=>{resize();pts=Array.from({length:70},()=>new Pt());};
  function draw(){
    cx.clearRect(0,0,W,H);
    const g=cx.createRadialGradient(W*.3,H*.2,0,W*.5,H*.5,W*.8);
    g.addColorStop(0,'rgba(0,80,210,.14)');g.addColorStop(1,'rgba(0,0,0,0)');
    cx.fillStyle=g;cx.fillRect(0,0,W,H);
    pts.forEach(p=>{
      p.x+=p.vx;p.y+=p.vy;
      if(p.x<0)p.x=W;if(p.x>W)p.x=0;if(p.y<0)p.y=H;if(p.y>H)p.y=0;
      cx.beginPath();cx.arc(p.x,p.y,1.1,0,Math.PI*2);
      cx.fillStyle=`rgba(0,198,255,${p.a})`;cx.fill();
    });
    for(let i=0;i<pts.length;i++)for(let j=i+1;j<pts.length;j++){
      const d=Math.hypot(pts[i].x-pts[j].x,pts[i].y-pts[j].y);
      if(d<85){cx.beginPath();cx.moveTo(pts[i].x,pts[i].y);cx.lineTo(pts[j].x,pts[j].y);
        cx.strokeStyle=`rgba(0,198,255,${.055*(1-d/85)})`;cx.lineWidth=.5;cx.stroke();}
    }
    requestAnimationFrame(draw);
  }
  window.addEventListener('resize',resize);init();draw();
})();

// ── TAB NAVIGATION (mobile) ───────────────────────────────────
let tabAtiva = 'chat';

function abrirTab(tab) {
  tabAtiva = tab;
  const chatPanel = document.getElementById('chat-panel');
  const pdfPanel  = document.getElementById('pdf-panel');
  const tabChat   = document.getElementById('tab-chat');
  const tabPdf    = document.getElementById('tab-pdf');

  if (tab === 'chat') {
    chatPanel.classList.remove('tab-hidden');
    pdfPanel.classList.remove('tab-active');
    tabChat.classList.add('active');
    tabPdf.classList.remove('active');
    // Foco no input
    setTimeout(()=>document.getElementById('pergunta-input').focus(),300);
  } else {
    chatPanel.classList.add('tab-hidden');
    pdfPanel.classList.add('tab-active');
    tabPdf.classList.add('active');
    tabChat.classList.remove('active');
    // Remove badge ao abrir
    const badge = document.getElementById('tab-badge');
    if (badge) badge.remove();
    // Re-renderiza se necessário
    if (paginasResultado.length && !document.querySelector('.page-wrapper')) {
      renderPagina(paginasResultado[idxAtual], palavrasBusca);
    }
  }
}

function mostrarBadgePdf(n) {
  // Remove badge antigo
  const antigo = document.getElementById('tab-badge');
  if (antigo) antigo.remove();
  if (n <= 0) return;
  const badge = document.createElement('span');
  badge.id = 'tab-badge';
  badge.className = 'tab-badge';
  badge.textContent = n;
  document.getElementById('tab-pdf').appendChild(badge);
}

// ── ESTADO PDF ───────────────────────────────────────────────
let pdfDoc = null, paginasResultado = [], idxAtual = 0, palavrasBusca = [];

pdfjsLib.getDocument('/manual.pdf').promise.then(doc => {
  pdfDoc = doc;
  adicionarMsgBot(`Olá! 👋 O manual está carregado e pronto.<br/>Podes fazer qualquer pergunta sobre <strong>{{ manual_nome }}</strong>.`);
}).catch(() => {
  adicionarMsgBot('⚠️ Não foi possível carregar o PDF.');
});

// ── RENDER COM DESTAQUE ──────────────────────────────────────
async function renderPagina(numPagina, palavras) {
  if (!pdfDoc) return;
  const container = document.getElementById('pdf-container');
  container.innerHTML = '';

  const page = await pdfDoc.getPage(numPagina);
  const containerW = Math.max(container.clientWidth - 24, 280);
  const baseVP = page.getViewport({scale:1});
  const scale  = Math.max(containerW / baseVP.width, .8);
  const vp     = page.getViewport({scale});

  const wrap = document.createElement('div');
  wrap.className = 'page-wrapper';
  wrap.style.width = vp.width + 'px';

  const label = document.createElement('div');
  label.className = 'page-label';
  label.textContent = `Página ${numPagina}`;

  const canvas = document.createElement('canvas');
  canvas.className = 'page-canvas';
  canvas.width = vp.width; canvas.height = vp.height;

  const hlCv = document.createElement('canvas');
  hlCv.className = 'hl-canvas';
  hlCv.width = vp.width; hlCv.height = vp.height;
  hlCv.style.width = vp.width+'px'; hlCv.style.height = vp.height+'px';

  wrap.appendChild(label);
  wrap.appendChild(canvas);
  wrap.appendChild(hlCv);
  container.appendChild(wrap);

  await page.render({canvasContext:canvas.getContext('2d'), viewport:vp}).promise;

  if (palavras && palavras.length) {
    const tc  = await page.getTextContent();
    const ctx = hlCv.getContext('2d');
    ctx.fillStyle = 'rgba(255,210,0,.38)';
    for (const item of tc.items) {
      if (!item.str || !item.str.trim()) continue;
      const lower = item.str.toLowerCase();
      if (palavras.some(w => w.length>2 && lower.includes(w.toLowerCase()))) {
        const tx = pdfjsLib.Util.transform(vp.transform, item.transform);
        const fH = Math.abs(item.transform[3]) * scale;
        const fW = item.width * scale;
        ctx.fillRect(tx[4], tx[5]-fH*1.05, fW, fH*1.3);
      }
    }
  }
  container.scrollTop = 0;
}

function navPagina(dir) {
  const novo = idxAtual + dir;
  if (novo<0 || novo>=paginasResultado.length) return;
  idxAtual = novo;
  atualizarNav();
  renderPagina(paginasResultado[idxAtual], palavrasBusca);
}

function atualizarNav() {
  document.getElementById('pagina-info').textContent =
    paginasResultado.length ? `${idxAtual+1}/${paginasResultado.length}` : '—';
  document.getElementById('btn-prev').disabled = idxAtual<=0;
  document.getElementById('btn-next').disabled = idxAtual>=paginasResultado.length-1;
  document.getElementById('pdf-toolbar-title').textContent =
    paginasResultado.length ? `Página ${paginasResultado[idxAtual]} do manual` : 'Visualizador do manual';
}

function mostrarPaginas(paginas, palavras) {
  if (!paginas || !paginas.length) return;
  paginasResultado = paginas;
  palavrasBusca    = palavras || [];
  idxAtual = 0;
  atualizarNav();

  const isMobile = window.innerWidth <= 700;
  if (isMobile) {
    // Badge na tab do manual
    mostrarBadgePdf(paginas.length);
  } else {
    renderPagina(paginasResultado[0], palavrasBusca);
  }
}

// ── CHAT ─────────────────────────────────────────────────────
function adicionarMsgUser(txt) {
  const msgs = document.getElementById('messages');
  const d = document.createElement('div');
  d.className = 'msg user'; d.textContent = txt;
  msgs.appendChild(d); msgs.scrollTop = msgs.scrollHeight;
}

function adicionarMsgBot(html) {
  const msgs = document.getElementById('messages');
  const d = document.createElement('div'); d.className = 'msg bot';
  const c = document.createElement('div'); c.className = 'msg-content'; c.innerHTML = html;
  const plain = c.textContent;
  const btn = document.createElement('button');
  btn.className = 'btn-ouvir'; btn.innerHTML = '🔊 Ouvir';
  btn.onclick = () => ouvir(plain, btn);
  d.appendChild(c); d.appendChild(btn);
  msgs.appendChild(d); msgs.scrollTop = msgs.scrollHeight;
}

function mostrarTyping() {
  const msgs = document.getElementById('messages');
  const d = document.createElement('div');
  d.className = 'msg bot typing'; d.id = 'typing';
  d.innerHTML = '<span></span><span></span><span></span>';
  msgs.appendChild(d); msgs.scrollTop = msgs.scrollHeight;
}
function removerTyping(){ const el=document.getElementById('typing'); if(el)el.remove(); }

async function enviar() {
  const inp = document.getElementById('pergunta-input');
  const q = inp.value.trim(); if (!q) return;
  inp.value = ''; autoResize(inp);
  adicionarMsgUser(q);
  document.getElementById('btn-enviar').disabled = true;
  mostrarTyping();
  try {
    const res  = await fetch('/perguntar',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pergunta:q})});
    const data = await res.json();
    removerTyping();
    const html = data.resposta
      ? data.resposta.replace(/\n/g,'<br>').replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
      : `<em style="opacity:.5">Erro: ${data.erro}</em>`;
    adicionarMsgBot(html);
    if (data.paginas && data.paginas.length) mostrarPaginas(data.paginas, data.palavras_busca);
  } catch {
    removerTyping();
    adicionarMsgBot('<em style="opacity:.5">Erro de conexão.</em>');
  }
  document.getElementById('btn-enviar').disabled = false;
}

function verificarEnter(e){ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();enviar();} }
function autoResize(el){ el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,100)+'px'; }

// ── MICROFONE ────────────────────────────────────────────────
let rec=null,gravando=false;
function alternarMic(){
  const btn=document.getElementById('btn-mic');
  if(!('webkitSpeechRecognition' in window)&&!('SpeechRecognition' in window)){
    alert('Usa o Chrome para reconhecimento de voz.'); return; }
  if(gravando){rec.stop();return;}
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  rec=new SR(); rec.lang='pt-BR'; rec.interimResults=true;
  rec.onstart=()=>{gravando=true;btn.classList.add('gravando');btn.textContent='⏹️';};
  rec.onend=()=>{gravando=false;btn.classList.remove('gravando');btn.textContent='🎤';};
  rec.onresult=e=>{
    const t=Array.from(e.results).map(r=>r[0].transcript).join('');
    document.getElementById('pergunta-input').value=t;
    autoResize(document.getElementById('pergunta-input'));
    if(e.results[e.results.length-1].isFinal) setTimeout(enviar,500);
  };
  rec.start();
}

// ── TEXT-TO-SPEECH ───────────────────────────────────────────
let vozAtual=null;
function ouvir(txt,btn){
  if(vozAtual){speechSynthesis.cancel();
    if(btn.classList.contains('falando')){btn.classList.remove('falando');btn.innerHTML='🔊 Ouvir';vozAtual=null;return;}}
  document.querySelectorAll('.btn-ouvir.falando').forEach(b=>{b.classList.remove('falando');b.innerHTML='🔊 Ouvir';});
  const u=new SpeechSynthesisUtterance(txt); u.lang='pt-BR'; u.rate=.95;
  const v=speechSynthesis.getVoices().find(v=>v.lang.startsWith('pt'));
  if(v) u.voice=v;
  u.onstart=()=>{btn.classList.add('falando');btn.innerHTML='⏹️ Parar';vozAtual=btn;};
  u.onend=u.onerror=()=>{btn.classList.remove('falando');btn.innerHTML='🔊 Ouvir';vozAtual=null;};
  speechSynthesis.speak(u);
}
if(speechSynthesis.onvoiceschanged!==undefined)
  speechSynthesis.onvoiceschanged=()=>speechSynthesis.getVoices();

// Tab PDF: render ao abrir se ainda não renderizou
document.getElementById('tab-pdf').addEventListener('click', () => {
  if (paginasResultado.length && !document.querySelector('.page-wrapper')) {
    renderPagina(paginasResultado[idxAtual], palavrasBusca);
  }
});
</script>
